name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: edme_test
          POSTGRES_USER: edme
          POSTGRES_PASSWORD: edme
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U edme -d edme_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      INTEGRATION_DATABASE_URL: postgresql://edme:edme@localhost:5432/edme_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node --test test/postgres-integration.test.js
